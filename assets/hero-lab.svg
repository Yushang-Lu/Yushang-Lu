<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Technical atlas hero for Yushang Lu</title>
  <desc id="desc">An animated blueprint-style banner highlighting Python, machine learning, and technical documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="55%" stop-color="#0d1d34" />
      <stop offset="100%" stop-color="#16324f" />
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0" />
      <stop offset="50%" stop-color="#7FDBCA" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9fb6cc" stroke-opacity="0.12" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="360" rx="24" fill="url(#bg)" />
  <rect width="900" height="360" rx="24" fill="url(#grid)" />

  <g opacity="0.85">
    <path d="M70 60H360" stroke="#7FDBCA" stroke-opacity="0.35" stroke-width="2" />
    <path d="M540 305H830" stroke="#F2C879" stroke-opacity="0.22" stroke-width="2" />
    <path d="M770 58c-82 0-140 50-176 108-25 41-58 66-114 66H336" fill="none" stroke="#7FDBCA" stroke-width="2.5" stroke-opacity="0.6" />
    <path d="M688 86c-68 8-109 41-139 87-34 52-83 86-156 86h-73" fill="none" stroke="#F2C879" stroke-width="1.8" stroke-opacity="0.65" stroke-dasharray="8 10" />
  </g>

  <g transform="translate(64 58)">
    <rect width="284" height="244" rx="22" fill="#081420" fill-opacity="0.62" stroke="#7FDBCA" stroke-opacity="0.28" />
    <text x="28" y="42" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7FDBCA" letter-spacing="3">YUSHANG LU</text>
    <text x="28" y="106" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#F5FAFF">Python / ML</text>
    <text x="28" y="148" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#F5FAFF">Project Builder</text>
  </g>

  <g transform="translate(440 34)">
    <circle cx="220" cy="146" r="92" fill="none" stroke="#7FDBCA" stroke-width="2" stroke-opacity="0.7" />
    <circle cx="220" cy="146" r="58" fill="none" stroke="#F2C879" stroke-width="1.5" stroke-opacity="0.7" stroke-dasharray="5 10" />
    <ellipse cx="220" cy="146" rx="148" ry="52" fill="none" stroke="#7FDBCA" stroke-width="1.6" stroke-opacity="0.45">
      <animateTransform attributeName="transform" type="rotate" from="0 220 146" to="360 220 146" dur="18s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="220" cy="146" rx="72" ry="132" fill="none" stroke="#F2C879" stroke-width="1.6" stroke-opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 220 146" to="-360 220 146" dur="24s" repeatCount="indefinite" />
    </ellipse>

    <circle cx="220" cy="146" r="28" fill="#0e2037" stroke="#EAF4FF" stroke-opacity="0.2" />
    <text x="220" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#F5FAFF">YL</text>

    <g filter="url(#softGlow)">
      <circle cx="324" cy="136" r="7" fill="#7FDBCA" />
      <circle cx="220" cy="54" r="6" fill="#F2C879" />
      <circle cx="156" cy="248" r="6" fill="#7FDBCA" />
      <circle cx="291" cy="250" r="5" fill="#F2C879" />
    </g>

    <path d="M112 268h214" stroke="#7FDBCA" stroke-width="1.2" stroke-opacity="0.28" />
    <path d="M134 38h172" stroke="#F2C879" stroke-width="1.2" stroke-opacity="0.28" />

    <rect x="288" y="70" width="96" height="28" rx="14" fill="#11253a" stroke="#7FDBCA" stroke-opacity="0.5" />
    <text x="336" y="88" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">python</text>

    <rect x="92" y="84" width="84" height="28" rx="14" fill="#11253a" stroke="#F2C879" stroke-opacity="0.5" />
    <text x="134" y="102" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">ml</text>

    <rect x="286" y="216" width="92" height="28" rx="14" fill="#11253a" stroke="#F2C879" stroke-opacity="0.5" />
    <text x="332" y="234" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">docs</text>
  </g>

  <rect x="60" y="320" width="780" height="6" rx="3" fill="url(#beam)">
    <animate attributeName="x" values="60;84;60" dur="6s" repeatCount="indefinite" />
  </rect>
</svg>
