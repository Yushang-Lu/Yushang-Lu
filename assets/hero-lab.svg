<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Formal technical atlas hero for Yushang Lu</title>
  <desc id="desc">A polished blueprint-style banner for Yushang Lu with layered depth, orbital motion, and a more formal technical focus label.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07101d" />
      <stop offset="48%" stop-color="#0c1d33" />
      <stop offset="100%" stop-color="#16324f" />
    </linearGradient>
    <radialGradient id="leftGlow" cx="24%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0.18" />
      <stop offset="45%" stop-color="#7FDBCA" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#7FDBCA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rightGlow" cx="76%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0.14" />
      <stop offset="42%" stop-color="#F2C879" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#7FDBCA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="65%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.26" />
    </radialGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0" />
      <stop offset="34%" stop-color="#7FDBCA" stop-opacity="0.32" />
      <stop offset="52%" stop-color="#F2C879" stop-opacity="0.78" />
      <stop offset="70%" stop-color="#7FDBCA" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#7FDBCA" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0.48" />
      <stop offset="60%" stop-color="#EAF4FF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0.26" />
    </linearGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1626" stop-opacity="0.84" />
      <stop offset="100%" stop-color="#13253a" stop-opacity="0.56" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#9fb6cc" stroke-opacity="0.1" stroke-width="1" />
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="panelShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02070d" flood-opacity="0.45" />
    </filter>
    <filter id="innerSpark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="360" rx="24" fill="url(#bg)" />
  <rect width="900" height="360" rx="24" fill="url(#leftGlow)" />
  <rect width="900" height="360" rx="24" fill="url(#rightGlow)" />
  <rect width="900" height="360" rx="24" fill="url(#grid)" />
  <rect width="900" height="360" rx="24" fill="url(#vignette)" />

  <g opacity="0.78">
    <path d="M58 66H356" stroke="#7FDBCA" stroke-opacity="0.24" stroke-width="2" />
    <path d="M540 302H842" stroke="#F2C879" stroke-opacity="0.18" stroke-width="2" />
    <path d="M774 56c-86 0-146 54-182 112-24 38-56 64-112 64H336" fill="none" stroke="#7FDBCA" stroke-width="2.4" stroke-opacity="0.48" />
    <path d="M700 88c-70 10-112 42-142 88-33 50-80 83-152 83h-80" fill="none" stroke="#F2C879" stroke-width="1.7" stroke-opacity="0.42" stroke-dasharray="7 10" />
    <circle cx="760" cy="56" r="2.8" fill="#7FDBCA" opacity="0.9" />
    <circle cx="823" cy="301" r="2.8" fill="#F2C879" opacity="0.82" />
  </g>

  <g transform="translate(64 56)" filter="url(#panelShadow)">
    <rect width="292" height="248" rx="24" fill="url(#cardFill)" />
    <rect x="1.2" y="1.2" width="289.6" height="245.6" rx="22.8" fill="none" stroke="url(#cardStroke)" stroke-width="1.6" />
    <rect x="14" y="14" width="264" height="220" rx="18" fill="none" stroke="#EAF4FF" stroke-opacity="0.06" />
    <rect x="0" y="0" width="292" height="248" rx="24" fill="url(#leftGlow)" opacity="0.32" />

    <circle cx="250" cy="32" r="3" fill="#7FDBCA" opacity="0.9" />
    <circle cx="264" cy="32" r="3" fill="#F2C879" opacity="0.8" />

    <text x="30" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7FDBCA" letter-spacing="3">YUSHANG LU</text>
    <text x="30" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="700" fill="#F5FAFF">Python / ML</text>
    <text x="30" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="35" font-weight="700" fill="#F5FAFF">Project Builder</text>

    <path d="M30 184H210" stroke="#7FDBCA" stroke-opacity="0.24" stroke-width="2" />
    <path d="M30 198H168" stroke="#F2C879" stroke-opacity="0.18" stroke-width="2" />

    <rect x="30" y="206" width="136" height="24" rx="12" fill="#10263b" stroke="#7FDBCA" stroke-opacity="0.34" />
    <text x="98" y="222" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="11" fill="#EAF4FF">Technical Focus</text>
  </g>

  <g transform="translate(438 32)">
    <circle cx="220" cy="148" r="104" fill="#0b1829" fill-opacity="0.2" />
    <circle cx="220" cy="148" r="94" fill="none" stroke="#7FDBCA" stroke-width="2.1" stroke-opacity="0.58" />
    <circle cx="220" cy="148" r="60" fill="none" stroke="#F2C879" stroke-width="1.6" stroke-opacity="0.72" stroke-dasharray="5 11" />
    <ellipse cx="220" cy="148" rx="152" ry="54" fill="none" stroke="#7FDBCA" stroke-width="1.7" stroke-opacity="0.36">
      <animateTransform attributeName="transform" type="rotate" from="0 220 148" to="360 220 148" dur="20s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="220" cy="148" rx="76" ry="136" fill="none" stroke="#F2C879" stroke-width="1.5" stroke-opacity="0.32">
      <animateTransform attributeName="transform" type="rotate" from="0 220 148" to="-360 220 148" dur="26s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="220" cy="148" rx="122" ry="88" fill="none" stroke="#EAF4FF" stroke-width="1.1" stroke-opacity="0.12" stroke-dasharray="3 10">
      <animateTransform attributeName="transform" type="rotate" from="0 220 148" to="360 220 148" dur="34s" repeatCount="indefinite" />
    </ellipse>

    <circle cx="220" cy="148" r="34" fill="#102238" stroke="#EAF4FF" stroke-opacity="0.14" />
    <circle cx="220" cy="148" r="28" fill="#0c1b2d" stroke="#7FDBCA" stroke-opacity="0.18" />
    <circle cx="220" cy="148" r="39" fill="none" stroke="#7FDBCA" stroke-opacity="0.08" filter="url(#softGlow)" />
    <text x="220" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#F5FAFF">YL</text>

    <g filter="url(#softGlow)">
      <circle cx="326" cy="137" r="7" fill="#7FDBCA">
        <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" repeatCount="indefinite" />
      </circle>
      <circle cx="220" cy="56" r="6" fill="#F2C879">
        <animate attributeName="opacity" values="0.8;0.35;0.8" dur="2.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="154" cy="252" r="6" fill="#7FDBCA">
        <animate attributeName="opacity" values="0.55;1;0.55" dur="3.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="294" cy="252" r="5.5" fill="#F2C879">
        <animate attributeName="opacity" values="1;0.45;1" dur="3.7s" repeatCount="indefinite" />
      </circle>
    </g>

    <g filter="url(#innerSpark)">
      <circle cx="274" cy="95" r="2.4" fill="#EAF4FF" opacity="0.75" />
      <circle cx="176" cy="104" r="2.1" fill="#EAF4FF" opacity="0.58" />
      <circle cx="260" cy="212" r="2.2" fill="#EAF4FF" opacity="0.54" />
    </g>

    <path d="M112 272h220" stroke="#7FDBCA" stroke-width="1.2" stroke-opacity="0.22" />
    <path d="M134 42h176" stroke="#F2C879" stroke-width="1.2" stroke-opacity="0.2" />

    <rect x="288" y="70" width="100" height="28" rx="14" fill="#10243a" stroke="#7FDBCA" stroke-opacity="0.46" />
    <text x="338" y="88" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">python</text>

    <rect x="88" y="84" width="88" height="28" rx="14" fill="#10243a" stroke="#F2C879" stroke-opacity="0.44" />
    <text x="132" y="102" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">ml</text>

    <rect x="286" y="220" width="96" height="28" rx="14" fill="#10243a" stroke="#F2C879" stroke-opacity="0.42" />
    <text x="334" y="238" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12" fill="#EAF4FF">docs</text>
  </g>

  <g opacity="0.9">
    <rect x="58" y="318" width="784" height="10" rx="5" fill="#0b1b2d" />
    <rect x="58" y="320" width="784" height="6" rx="3" fill="url(#beam)">
      <animate attributeName="x" values="58;74;58" dur="7s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
