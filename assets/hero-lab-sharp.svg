<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sharp technical atlas hero for Yushang Lu</title>
  <desc id="desc">A GitHub-display-optimized banner for Yushang Lu with clearer lines, restrained glow, and improved text readability.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="52%" stop-color="#0d1e33" />
      <stop offset="100%" stop-color="#173550" />
    </linearGradient>
    <radialGradient id="leftTint" cx="22%" cy="34%" r="52%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#7FDBCA" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="rightTint" cx="78%" cy="42%" r="46%">
      <stop offset="0%" stop-color="#F2C879" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1727" stop-opacity="0.94" />
      <stop offset="100%" stop-color="#13263c" stop-opacity="0.82" />
    </linearGradient>
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0.28" />
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7FDBCA" stop-opacity="0" />
      <stop offset="40%" stop-color="#7FDBCA" stop-opacity="0.38" />
      <stop offset="52%" stop-color="#F2C879" stop-opacity="0.86" />
      <stop offset="66%" stop-color="#7FDBCA" stop-opacity="0.32" />
      <stop offset="100%" stop-color="#7FDBCA" stop-opacity="0" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#9fb6cc" stroke-opacity="0.07" stroke-width="1.5" shape-rendering="crispEdges" />
    </pattern>
    <filter id="tightGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="360" rx="24" fill="url(#bg)" />
  <rect width="900" height="360" rx="24" fill="url(#leftTint)" />
  <rect width="900" height="360" rx="24" fill="url(#rightTint)" />
  <rect width="900" height="360" rx="24" fill="url(#grid)" />

  <g opacity="0.92">
    <path d="M60 68H356" stroke="#7FDBCA" stroke-opacity="0.28" stroke-width="2.5" stroke-linecap="round" />
    <path d="M540 302H840" stroke="#F2C879" stroke-opacity="0.22" stroke-width="2.5" stroke-linecap="round" />
    <path d="M772 58c-82 0-142 52-178 108-24 37-56 64-114 64H336" fill="none" stroke="#7FDBCA" stroke-width="2.6" stroke-opacity="0.52" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M698 88c-69 10-110 42-140 86-33 48-79 80-152 80h-80" fill="none" stroke="#F2C879" stroke-width="2" stroke-opacity="0.42" stroke-dasharray="8 10" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="760" cy="58" r="3" fill="#7FDBCA" />
    <circle cx="822" cy="302" r="3" fill="#F2C879" />
  </g>

  <g transform="translate(64 56)">
    <rect width="292" height="248" rx="24" fill="url(#cardFill)" />
    <rect x="1.5" y="1.5" width="289" height="245" rx="22.5" fill="none" stroke="url(#cardStroke)" stroke-width="2" />
    <rect x="16" y="16" width="260" height="216" rx="18" fill="none" stroke="#EAF4FF" stroke-opacity="0.08" stroke-width="1.5" />

    <circle cx="250" cy="32" r="3.5" fill="#7FDBCA" />
    <circle cx="264" cy="32" r="3.5" fill="#F2C879" />

    <text x="30" y="46" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#7FDBCA" letter-spacing="3">YUSHANG LU</text>
    <text x="30" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#F5FAFF">Python / ML</text>
    <text x="30" y="154" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#F5FAFF">Project Builder</text>

    <path d="M30 184H214" stroke="#7FDBCA" stroke-opacity="0.28" stroke-width="2.5" stroke-linecap="round" />
    <path d="M30 198H170" stroke="#F2C879" stroke-opacity="0.22" stroke-width="2.5" stroke-linecap="round" />

    <rect x="30" y="206" width="140" height="26" rx="13" fill="#10263b" stroke="#7FDBCA" stroke-opacity="0.42" stroke-width="1.5" />
    <text x="100" y="223" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="12.5" font-weight="600" fill="#F3F8FD">Technical Focus</text>
  </g>

  <g transform="translate(438 32)">
    <circle cx="220" cy="148" r="96" fill="none" stroke="#7FDBCA" stroke-width="2.5" stroke-opacity="0.62" />
    <circle cx="220" cy="148" r="62" fill="none" stroke="#F2C879" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="6 10" />
    <ellipse cx="220" cy="148" rx="150" ry="54" fill="none" stroke="#7FDBCA" stroke-width="2" stroke-opacity="0.38">
      <animateTransform attributeName="transform" type="rotate" from="0 220 148" to="360 220 148" dur="22s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="220" cy="148" rx="78" ry="136" fill="none" stroke="#F2C879" stroke-width="1.8" stroke-opacity="0.34">
      <animateTransform attributeName="transform" type="rotate" from="0 220 148" to="-360 220 148" dur="28s" repeatCount="indefinite" />
    </ellipse>

    <circle cx="220" cy="148" r="34" fill="#102238" stroke="#EAF4FF" stroke-opacity="0.16" stroke-width="1.5" />
    <circle cx="220" cy="148" r="28" fill="#0d1c2f" stroke="#7FDBCA" stroke-opacity="0.22" stroke-width="1.5" />
    <circle cx="220" cy="148" r="36" fill="none" stroke="#7FDBCA" stroke-opacity="0.1" stroke-width="2" filter="url(#tightGlow)" />
    <text x="220" y="158" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="31" font-weight="700" fill="#F5FAFF">YL</text>

    <g filter="url(#tightGlow)">
      <circle cx="326" cy="137" r="6.5" fill="#7FDBCA">
        <animate attributeName="opacity" values="1;0.6;1" dur="3.4s" repeatCount="indefinite" />
      </circle>
      <circle cx="220" cy="56" r="5.5" fill="#F2C879">
        <animate attributeName="opacity" values="0.85;0.45;0.85" dur="2.8s" repeatCount="indefinite" />
      </circle>
      <circle cx="154" cy="252" r="5.5" fill="#7FDBCA">
        <animate attributeName="opacity" values="0.65;1;0.65" dur="3.2s" repeatCount="indefinite" />
      </circle>
      <circle cx="294" cy="252" r="5" fill="#F2C879">
        <animate attributeName="opacity" values="1;0.55;1" dur="3.7s" repeatCount="indefinite" />
      </circle>
    </g>

    <path d="M112 272h220" stroke="#7FDBCA" stroke-width="1.8" stroke-opacity="0.24" stroke-linecap="round" />
    <path d="M134 42h176" stroke="#F2C879" stroke-width="1.8" stroke-opacity="0.2" stroke-linecap="round" />

    <rect x="286" y="70" width="104" height="30" rx="15" fill="#10243a" stroke="#7FDBCA" stroke-opacity="0.54" stroke-width="1.5" />
    <text x="338" y="89" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="600" fill="#F3F8FD">python</text>

    <rect x="86" y="84" width="92" height="30" rx="15" fill="#10243a" stroke="#F2C879" stroke-opacity="0.5" stroke-width="1.5" />
    <text x="132" y="103" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="600" fill="#F3F8FD">ml</text>

    <rect x="284" y="220" width="100" height="30" rx="15" fill="#10243a" stroke="#F2C879" stroke-opacity="0.48" stroke-width="1.5" />
    <text x="334" y="239" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="13" font-weight="600" fill="#F3F8FD">docs</text>
  </g>

  <g opacity="0.94">
    <rect x="58" y="318" width="784" height="9" rx="4.5" fill="#0c1b2e" />
    <rect x="58" y="320" width="784" height="5" rx="2.5" fill="url(#beam)">
      <animate attributeName="x" values="58;72;58" dur="7s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
