<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YL orbit monogram</title>
  <desc id="desc">A monogram badge with orbital lines and a technical atlas color palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f" />
      <stop offset="100%" stop-color="#14314f" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7FDBCA" />
      <stop offset="100%" stop-color="#F2C879" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="144" height="144" rx="40" fill="url(#bg)" />

  <circle cx="80" cy="80" r="52" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.9" />
  <ellipse cx="80" cy="80" rx="64" ry="28" fill="none" stroke="#7FDBCA" stroke-width="1.8" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="360 80 80" dur="12s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="80" cy="80" rx="34" ry="68" fill="none" stroke="#F2C879" stroke-width="1.6" opacity="0.45">
    <animateTransform attributeName="transform" type="rotate" from="0 80 80" to="-360 80 80" dur="18s" repeatCount="indefinite" />
  </ellipse>

  <circle cx="116" cy="57" r="5" fill="#F2C879" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="116" r="4" fill="#7FDBCA" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" />
  </circle>

  <path d="M54 50h14l12 26 12-26h14l-18 38v22H88V89L70 50h14l11 23L106 50" fill="#EAF4FF" />
  <path d="M55 50v46c0 8 4 12 13 12h7v-11h-5c-3 0-4-1-4-4V50H55z" fill="#7FDBCA" opacity="0.95" />
  <path d="M108 50v57h-12V50h12z" fill="#F2C879" opacity="0.95" />
</svg>
