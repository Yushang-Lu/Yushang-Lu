<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D contribution placeholder</title>
  <desc id="desc">A light placeholder for the 3D contribution graph before the workflow generates real output.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="100%" stop-color="#eef5fb" />
    </linearGradient>
  </defs>
  <rect width="960" height="420" rx="22" fill="url(#bg)" />
  <g transform="translate(114 112)">
    <g fill="#d9e6ef">
      <path d="M0 42l22-13 22 13-22 13z" />
      <path d="M48 42l22-13 22 13-22 13z" />
      <path d="M96 42l22-13 22 13-22 13z" />
      <path d="M144 42l22-13 22 13-22 13z" />
      <path d="M192 42l22-13 22 13-22 13z" />
      <path d="M24 84l22-13 22 13-22 13z" />
      <path d="M72 84l22-13 22 13-22 13z" />
      <path d="M120 84l22-13 22 13-22 13z" />
      <path d="M168 84l22-13 22 13-22 13z" />
      <path d="M216 84l22-13 22 13-22 13z" />
    </g>
    <g fill="#7FDBCA">
      <path d="M312 42l22-13 22 13-22 13z">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite" />
      </path>
      <path d="M360 84l22-13 22 13-22 13z">
        <animate attributeName="opacity" values="1;0.5;1" dur="3.4s" repeatCount="indefinite" />
      </path>
      <path d="M408 126l22-13 22 13-22 13z">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite" />
      </path>
    </g>
    <g fill="#F2C879">
      <path d="M456 84l22-13 22 13-22 13z" />
      <path d="M504 126l22-13 22 13-22 13z" />
      <path d="M552 168l22-13 22 13-22 13z" />
    </g>
  </g>
  <text x="90" y="74" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#16324F">3D contribution graph placeholder</text>
  <text x="90" y="108" font-family="Consolas, Monaco, monospace" font-size="18" fill="#47637f">This card is committed up front so the README renders cleanly before the action generates real contribution terrain.</text>
  <text x="90" y="360" font-family="Consolas, Monaco, monospace" font-size="16" fill="#6d87a1">Target output: profile-season-animate.svg</text>
