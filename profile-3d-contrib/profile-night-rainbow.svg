      <path d="M48 42l22-13 22 13-22 13z" />
      <path d="M96 42l22-13 22 13-22 13z" />
      <path d="M144 42l22-13 22 13-22 13z" />
      <path d="M192 42l22-13 22 13-22 13z" />
      <path d="M24 84l22-13 22 13-22 13z" />
      <path d="M72 84l22-13 22 13-22 13z" />
      <path d="M120 84l22-13 22 13-22 13z" />
      <path d="M168 84l22-13 22 13-22 13z" />
      <path d="M216 84l22-13 22 13-22 13z" />
