<svg width="960" height="420" viewBox="0 0 960 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">3D contribution placeholder dark</title>
  <desc id="desc">A dark placeholder for the 3D contribution graph before the workflow generates real output.</desc>
